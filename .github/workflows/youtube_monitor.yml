name: YouTube Monitor

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  check-youtube:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests youtube-transcript-api openai feedparser

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPEN_AI }}
          SUPADATA_API_KEY: ${{ secrets.SUPADATA_API_KEY }}
        run: python youtube_monitor.py

      - name: Save last video ID
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add last_video.json
          git diff --staged --quiet || git commit -m "Update last seen video"
          git push
