name: Keep Alive

on:
  schedule:
    - cron: '0 9 * * *'  # runs every day at 9 AM
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - name: Keep alive
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git commit --allow-empty -m "Keep alive"
          git push
