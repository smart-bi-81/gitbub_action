name: Deploy Website

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Inject secrets into HTML
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_API_KEY: ${{ secrets.SUPABASE_API_KEY }}
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
        run: |
          python3 -c "
          import os
          with open('index.html', 'r') as f:
              content = f.read()
          content = content.replace('__SUPABASE_URL__', os.environ['SUPABASE_URL'])
          content = content.replace('__SUPABASE_API_KEY__', os.environ['SUPABASE_API_KEY'])
          content = content.replace('__MAKE_WEBHOOK_URL__', os.environ['MAKE_WEBHOOK_URL'])
          with open('index.html', 'w') as f:
              f.write(content)
          print('Secrets injected successfully')
          "

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: '.github,*.py,*.json,*.txt,*.yml'
